name: Test and Deploy

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

concurrency:
  group: ch0wn3rs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Test and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Start preview server
        env:
          PUBLIC_CLOUDFLARE_WEB_ANALYTICS_TOKEN: ${{ secrets.PUBLIC_CLOUDFLARE_WEB_ANALYTICS_TOKEN }}
        run: |
          npm run preview -- --host 127.0.0.1 --port 4321 > /tmp/ch0wn3rs-preview.log 2>&1 &
          echo $! > /tmp/ch0wn3rs-preview.pid

      - name: Smoke test homepage and API
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:4321/ > /tmp/homepage.html; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:4321/ > /tmp/homepage.html
          grep -q "Ch0wn3rs - Elite Cybersecurity Team" /tmp/homepage.html
          grep -q "Recent Competitions" /tmp/homepage.html

          curl -fsS "http://127.0.0.1:4321/api/ctftime?teamId=408704" > /tmp/ctftime.json
          grep -q '"recentCompetitions"' /tmp/ctftime.json
          grep -q '"globalRank"' /tmp/ctftime.json

      - name: Stop preview server
        if: always()
        run: |
          if [ -f /tmp/ch0wn3rs-preview.pid ]; then
            kill "$(cat /tmp/ch0wn3rs-preview.pid)" || true
          fi

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Deploy Pages project
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist --project-name ch0wn3rs --branch main
        env:
          PUBLIC_CLOUDFLARE_WEB_ANALYTICS_TOKEN: ${{ secrets.PUBLIC_CLOUDFLARE_WEB_ANALYTICS_TOKEN }}
